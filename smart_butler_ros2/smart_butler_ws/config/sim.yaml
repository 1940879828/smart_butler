# MOSS 机器人仿真环境配置
robot:
  name: "moss"
  mode: "simulation"  # simulation | real

# 功能开关
features:
  wake_word_enabled: true      # 唤醒词 "moss"
  face_recognition_enabled: false
  smart_home_enabled: true
  voice_interaction_enabled: true
  video_streaming_enabled: true
  notifications_enabled: false  # 通知推送（预留）

# 节点配置
nodes:
  camera:
    sim_source: "video_file"    # video_file | gazebo_plugin
    video_path: "/home/taro/文档/LeranRos/assets/test_video.mp4"
    resolution: [640, 480]
    fps: 30

  gimbal:
    default_pan: 0.0
    default_tilt: 0.0
    default_roll: 0.0
    max_pan_speed: 60.0         # 度/秒

  ai:
    api_base: "https://api.openai.com/v1"   # 或 "http://192.168.2.xxx:11434/v1" (Ollama)
    model: "gpt-4o-mini"                     # 或 "qwen2.5:7b" (本地模型)
    max_tokens: 2048
    temperature: 0.7

  voice:
    asr:
      backend: "mimo"                          # mimo | local | whisper_remote (design)
      language: "zh"
      sample_rate: 16000
      buffer_duration: 2.0                    # 秒，VAD 缓冲区时长
      silence_threshold: 3500                  # VAD 能量阈值，需高于环境噪声
      noise_reduction: true                     # 启用语音频段带通滤波 (80-4000Hz)
      filter_lowcut: 80                         # 高通截止频率 Hz（人声基频下限）
      filter_highcut: 4000                      # 低通截止频率 Hz（人声谐波上限）
      # VAD 配置
      vad_mode: "hybrid"                       # energy | webrtc | hybrid
      webrtc_aggressiveness: 2                 # WebRTC VAD 敏感度 (0-3, 3最严格)
      # MiMo ASR（backend=mimo 时使用）
      api_base: "https://token-plan-cn.xiaomimimo.com/v1"
      api_key: "tp-c6vopk55c5ugh7ivkhik8zy6cb5gd0mk24phappqamer5sb3"
      model: "mimo-v2.5-asr"
      max_retries: 3
      # 本地 Whisper（backend=local 时使用）
      local_model: "tiny"
      local_device: "cpu"
      local_compute_type: "int8"
      # 设计路径：Windows Whisper HTTP 服务（backend=whisper_remote 时使用）
      whisper_endpoint: "http://192.168.2.xxx:8001/transcribe"
    wake_word:
      enabled: true
      word: "moss"
      threshold: 0.5
      use_openwakeword: true
      energy_threshold: 3000
    tts:
      provider: "piper"         # piper | edge | local
      voice: "zh_CN"
      windows_endpoint: "http://192.168.2.xxx:8002"

  ha:
    base_url: "http://192.168.2.xxx:8123"
    token: "${HA_TOKEN}"        # 从环境变量读取

# 安全配置
security:
  jwt_secret: "${JWT_SECRET}"
  operation_log_dir: "/home/taro/文档/LeranRos/logs/operations"

# 跨机通信
network:
  windows_host: "192.168.2.xxx"  # Windows 机器 IP
  dds_domain: 0
  api_timeout: 30                # 秒
